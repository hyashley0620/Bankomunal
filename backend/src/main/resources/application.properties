# ─── Servidor ────────
server.port=8080

# ─── Base de datos ────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bankomunal?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
# CAMBIA ESTO: pon tu contraseña de MySQL
spring.datasource.password=TU_CONTRASEÑA_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────
jwt.secret=bankomunal-super-secret-key-256-bits-segura-2025
jwt.expiration-ms=86400000

# ─── CORS ─────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,file://

# ─── Multipart (subida de archivos) ─────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ─── Correo electrónico (Gmail) ───────────────────────────────────────────────
# Para activar: reemplaza con tu correo Gmail y contraseña de aplicación de 16 caracteres
# (Cuenta Google → Seguridad → Contraseñas de aplicación — requiere 2FA activo)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tucorreo@gmail.com
spring.mail.password=xxxx-xxxx-xxxx-xxxx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── URL del frontend ─────────────
# Usada en los correos de recuperación de contraseña (enlace reset-password.html)
app.frontend-url=http://127.0.0.1:5500

# ─── Scheduling (cierre automático de encuestas) ───────────
spring.task.scheduling.enabled=true

# ─── Logging ────────────────────
logging.level.com.bankomunal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=DEBUG
