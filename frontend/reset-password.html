<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Bankomunal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>

<body class="bg-auth-layout">

    <main class="auth-wrapper">
        <section class="card auth-card" aria-labelledby="titulo-reset">

            <header class="auth-header">
                <img src="assets/img/logo.png" alt="Logo Bankomunal" class="auth-logo-img">
                <div class="auth-brand">
                    <strong class="brand-name">BANKOMUNAL</strong>
                    <span class="brand-tagline">Microfinanzas Comunitarias</span>
                </div>
            </header>

            <h1 id="titulo-reset" class="auth-title">Crear nueva contraseña</h1>

            <p class="helper-text">
                Elige una contraseña segura de al menos 8 caracteres.
                Al guardar, serás redirigido al inicio de sesión.
            </p>

            <form id="resetPasswordForm" class="form-container" novalidate>


                <input type="hidden" id="resetToken" name="token">

                <div class="field-group">
                    <label for="newPassword">Nueva contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" name="password" placeholder="Mínimo 8 caracteres"
                            required autocomplete="new-password">
                        <button type="button" class="toggle-pass" id="togglePwd" aria-label="Ver contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="field-group">
                    <label for="newPassword2">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword2" name="password2" placeholder="Repite la contraseña"
                            required autocomplete="new-password">
                        <button type="button" class="toggle-pass" id="togglePwd2" aria-label="Ver contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>


                <p id="resetError" class="mensaje-status error-text" hidden></p>
                <p id="resetSuccess" class="mensaje-status success-text" hidden></p>

                <button type="submit" class="btn-primary btn-full" id="btnReset">
                    <i class="fa-solid fa-key"></i> Guardar nueva contraseña
                </button>

                <nav class="auth-navigation u-0de1f9">
                    <a href="login.html" class="register-link">
                        <i class="fa-solid fa-arrow-left"></i> Volver a iniciar sesión
                    </a>
                </nav>

            </form>

            <footer class="auth-footer">
                <p>&copy; 2026 Bankomunal. <br> Todos los derechos reservados.</p>
            </footer>

        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
