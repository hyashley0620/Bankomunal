<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Soporte | Bankomunal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/soporte.css">
    <link rel="stylesheet" href="../css/utilities.css">
</head>

<body class="bg-main">
    <div class="app-container">
        <aside class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="app-body">
            <header class="main-header" id="mainHeader">
                <div class="header-left">
                    <button id="menuToggle" class="btn-icon"><i class="fa-solid fa-bars"></i></button>
                    <span class="header-title">Chat de Soporte</span>
                </div>
                <div class="header-right">
                    <button id="themeBtn" class="btn-icon" title="Cambiar tema"><i
                            class="fa-solid fa-moon"></i></button>
                    <div class="notif-wrapper">
                        <button class="notif-btn" id="notifToggle"><i class="fa-solid fa-bell"></i><span
                                class="notif-badge hidden" id="notifCount">0</span></button>
                    </div>
                    <div class="user-profile">
                        <div class="user-text"><span id="nombreUsuario" class="user-name">Cargando...</span><small
                                id="rolUsuario" class="user-role">...</small></div>
                        <div id="avatarUsuario" class="avatar-circle">--</div>
                    </div>
                </div>
            </header>

            <main class="main-wrapper">
                <header class="content-header u-fe71ab">
                    <div>
                        <p class="welcome-msg">Asistencia en tiempo real con nuestro equipo.</p>
                    </div>
                    <button data-nav="soporte-tecnico.html" class="btn-secondary u-9ee0bb">
                        <i class="fa-solid fa-ticket"></i> Crear Ticket
                    </button>
                </header>


                <div class="chat-kpi-strip">
                    <div class="ck-pill"><i class="fa-solid fa-circle u-4d3564"></i><span>Soporte</span><span
                            class="cpv">En línea</span></div>
                    <div class="ck-pill"><i class="fa-solid fa-clock u-035cc8"></i><span>Respuesta:</span><span
                            class="cpv">~2 min</span></div>
                    <div class="ck-pill"><i class="fa-solid fa-star u-2a4cda"></i><span>Satisfacción:</span><span
                            class="cpv">4.8/5</span></div>
                    <div class="ck-pill"><i class="fa-solid fa-headset u-035cc8"></i><span>24/7</span><span
                            class="cpv u-deccf9">Disponible</span></div>
                </div>


                <div class="chat-wrapper">

                    <div class="chat-bar">
                        <div class="chat-agent">
                            <div class="bot-av">
                                <i class="fa-solid fa-robot"></i>
                                <span class="online-dot"></span>
                            </div>
                            <div class="agent-info">
                                <div class="aname" id="agentNameDisplay">Asistente Bankomunal</div>
                                <div class="astatus" id="agentStatusText"><i class="fa-solid fa-circle u-d9303a"></i> En
                                    línea ahora</div>
                            </div>
                        </div>
                        <button id="goToTickets" class="btn-secondary u-1df1bf">
                            <i class="fa-solid fa-ticket"></i> Mis Tickets
                        </button>
                        <button id="endChatBtn" class="btn-secondary u-1df1bf">
                            <i class="fa-solid fa-phone-slash"></i> Finalizar
                        </button>
                    </div>


                    <div class="quick-replies">
                        <button class="qr-btn" data-msg="¿Cómo solicito un préstamo?">💰 Solicitar préstamo</button>
                        <button class="qr-btn" data-msg="Tuve un problema con una transferencia">⚠️ Problema
                            transferencia</button>
                        <button class="qr-btn" data-msg="¿Cuál es mi saldo actual?">💳 Consultar saldo</button>
                        <button class="qr-btn" data-msg="Necesito cambiar mi contraseña">🔐 Cambiar contraseña</button>
                    </div>


                    <div id="chatBox" class="chat-messages">
                        <div class="chat-sep">Hoy <span id="chatStartTime"></span></div>
                        <div class="msg-bot">

                        </div>
                    </div>


                    <div class="chat-input-area">
                        <form id="chatForm" class="chat-form">
                            <input type="file" id="fileAttachment" accept=".pdf,.jpg,.png" class="u-cb4589">
                            <button type="button" class="btn-icon u-5cd105" data-trigger="fileAttachment"
                                title="Adjuntar">
                                <i class="fa-solid fa-paperclip"></i>
                            </button>
                            <input type="text" id="chatInput" placeholder="Escribe un mensaje..." autocomplete="off">
                            <button type="submit" class="chat-send-btn" id="sendChat">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                        <div class="chat-secure"><i class="fa-solid fa-lock"></i> Conversación protegida con
                            encriptación SSL</div>
                    </div>
                </div>

                <footer class="main-footer">
                    <p>&copy; 2026 Bankomunal. Soporte Técnico Especializado.</p>
                </footer>
            </main>
        </div>
    </div>
    <div id="toast" class="toast-container"></div>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/panel.js"></script>
    <script src="../js/soporte.js"></script>
</body>

</html>
