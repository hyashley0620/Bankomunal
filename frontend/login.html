<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Bankomunal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>

<body class="bg-auth-layout">

    <main class="auth-wrapper">
        <section class="card auth-card" aria-labelledby="titulo-login">

            <header class="auth-header">
                <img src="assets/img/logo.png" alt="Logo Bankomunal" class="auth-logo-img">
                <div class="auth-brand">
                    <strong class="brand-name">BANKOMUNAL</strong>
                    <span class="brand-tagline">Microfinanzas Comunitarias</span>
                </div>
            </header>

            <h1 id="titulo-login" class="auth-title">Iniciar sesión</h1>

            <form id="loginForm" class="form-container" novalidate>

                <div class="field-group">
                    <label for="user">Correo electrónico</label>
                    <input type="text" id="user" name="user" placeholder="ejemplo@correo.com" required
                        autocomplete="username">
                    <small class="helper-text">Use el correo electrónico registrado.</small>
                </div>

                <div class="field-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            autocomplete="current-password">
                        <button type="button" class="toggle-pass" id="togglePwd" aria-label="Ver contraseña">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <small class="helper-text">Mínimo 8 caracteres.</small>
                </div>

                <div class="auth-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Recordarme</span>
                    </label>
                    <a href="recuperar-contrasena.html" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>

                <button type="submit" class="btn-primary btn-full" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
                </button>

                <p id="errorMsg" class="mensaje-status error-text" hidden></p>
            </form>

            <nav class="auth-navigation mt-15">
                <p>¿No tienes una cuenta? <a href="registro.html" class="register-link">Regístrate aquí</a></p>
            </nav>

            <footer class="auth-footer">
                <p>&copy; 2026 Bankomunal. Todos los derechos reservados.</p>
            </footer>
        </section>
    </main>

    <div id="toast" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
